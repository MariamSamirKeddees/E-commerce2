# CI/CD: check Docker Hub for image → build/push only if missing → copy files → pull & start.
# .env is managed manually on the server at DEPLOY_DIR.
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, SERVER_IP, SERVER_USER, SERVER_PASSWORD

name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ecommerce-api
  DEPLOY_DIR: /apps/E-commerce

jobs:
  build-and-push:
    name: Build image if missing
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Check if image exists on Docker Hub
        id: image
        run: |
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"
          if docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
            echo "Image $IMAGE already exists on Docker Hub."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image $IMAGE not found on Docker Hub."
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.image.outputs.exists == 'false'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: steps.image.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build
        if: steps.image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/validate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push to Docker Hub
        if: steps.image.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure deploy directory exists on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p ${{ env.DEPLOY_DIR }}

      - name: Copy docker-compose.yml and Dockerfile to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "docker-compose.yml,Dockerfile"
          target: ${{ env.DEPLOY_DIR }}

      - name: Pull images and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_DIR }}
            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest"

            if [ ! -f .env ]; then
              echo "ERROR: .env not found. Create /apps/E-commerce/.env manually on the server."
              exit 1
            fi

            if grep -q '^DOCKER_IMAGE=' .env; then
              sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${IMAGE}|" .env
            else
              echo "DOCKER_IMAGE=${IMAGE}" >> .env
            fi

            docker compose pull
            docker compose up -d --no-build --remove-orphans
            docker compose ps
            docker image prune -f

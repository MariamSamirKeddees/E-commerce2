# CI/CD: build & push to Docker Hub → copy compose/Dockerfile/.env to server → pull & start.
#
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, SERVER_IP, SERVER_USER, SERVER_PASSWORD
#          PRODUCTION_ENV — paste your full production .env file (passwords, ports, JWT key, etc.)

name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ecommerce-api
  DEPLOY_DIR: /apps/E-commerce

jobs:
  build-and-push:
    name: Validate, build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: local/validate:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy bundle
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          mkdir -p deploy-bundle
          cp docker-compose.yml Dockerfile deploy-bundle/
          printf '%s\n' "$PRODUCTION_ENV" > deploy-bundle/.env
          IMAGE="${DOCKERHUB_USERNAME}/${{ env.IMAGE_NAME }}:latest"
          if grep -q '^DOCKER_IMAGE=' deploy-bundle/.env; then
            sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=${IMAGE}|" deploy-bundle/.env
          else
            echo "DOCKER_IMAGE=${IMAGE}" >> deploy-bundle/.env
          fi

      - name: Ensure deploy directory exists on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: mkdir -p ${{ env.DEPLOY_DIR }}

      - name: Copy docker-compose.yml, Dockerfile, and .env to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "deploy-bundle/docker-compose.yml,deploy-bundle/Dockerfile,deploy-bundle/.env"
          target: ${{ env.DEPLOY_DIR }}
          overwrite: true

      - name: Pull images and start containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker compose pull
            docker compose up -d --no-build --remove-orphans
            docker image prune -f
